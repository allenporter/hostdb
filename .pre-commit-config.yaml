---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: 'tests/testdata/.*yaml$'
      - id: end-of-file-fixer
      - id: check-yaml
        args:
          - --unsafe  # Allow !include and other constructors
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        types_or:
          - python
          - pyi
        args:
          - --fix
          - --exit-non-zero-on-fix
      - id: ruff-format
        types_or:
          - python
          - pyi
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: ty check . --ignore unresolved-import --ignore invalid-argument-type --ignore invalid-return-type --ignore not-iterable --ignore unresolved-attribute
        language: python
        pass_filenames: false
        additional_dependencies: ["ty==0.0.50"]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        exclude: |
            (?x)^(
                hostdb/resources/wordlist
            )$
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: '^tests/tool/testdata/.*\.yaml$'
        args:
          - --strict
          - -c
          - ".yaml-lint.yaml"
